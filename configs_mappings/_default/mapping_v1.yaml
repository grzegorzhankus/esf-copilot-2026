      - BilansJednostkaInna/Pasywa/Pasywa_B/Pasywa_B_III/KwotaA
    required: true
  - key: bs_fixed_assets
    xpaths:
      - Bilans/Aktywa/Aktywa_A/KwotaA
      - Bilans/Aktywa/AktywaTrwale/KwotaA
    required: false
  - key: bs_inventory
    xpaths:
      - Bilans/Aktywa/Aktywa_B/Aktywa_B_I/KwotaA
    required: false
  - key: bs_accounts_receivable
    xpaths:
      - Bilans/Aktywa/Aktywa_B/Aktywa_B_II/KwotaA
    required: false
  - key: bs_cash
