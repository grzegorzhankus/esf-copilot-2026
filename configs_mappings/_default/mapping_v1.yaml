schema_id: _default
unit: PLN
# Default fallback mapping with common XPath patterns for Polish financial statements
required_metrics:
  - bs_assets_total
  - bs_equity
  - bs_liabilities_total
  - bs_current_assets
  - bs_current_liabilities
  - pl_revenue
  - pl_gross_profit
  - pl_ebit
  - pl_net_profit
metrics:
  - key: bs_assets_total
    xpaths:
      - Bilans/Aktywa/KwotaA
      - BilansJednostkaMala/Aktywa/KwotaA
      - BilansJednostkaInna/Aktywa/KwotaA
    required: true
  - key: bs_equity
    xpaths:
      - Bilans/Pasywa/Pasywa_A/KwotaA
      - Bilans/Pasywa/KapitalWlasny/KwotaA
      - BilansJednostkaMala/Pasywa/Pasywa_A/KwotaA
      - BilansJednostkaInna/Pasywa/Pasywa_A/KwotaA
    required: true
  - key: bs_liabilities_total
    xpaths:
      - Bilans/Pasywa/Pasywa_B/KwotaA
      - Bilans/Pasywa/Zobowiazania/KwotaA
      - BilansJednostkaMala/Pasywa/Pasywa_B/KwotaA
      - BilansJednostkaInna/Pasywa/Pasywa_B/KwotaA
    required: true
  - key: bs_current_assets
    xpaths:
      - Bilans/Aktywa/Aktywa_B/KwotaA
      - Bilans/Aktywa/AktywaObrotowe/KwotaA
      - BilansJednostkaMala/Aktywa/Aktywa_B/KwotaA
      - BilansJednostkaInna/Aktywa/Aktywa_B/KwotaA
