# e-SF Copilot 2026 Docker Compose
# Optimized for NVIDIA DGX Spark deployment

services:
  esf-copilot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esf-copilot-2026
    ports:
      - "8501:8501"
    volumes:
      # Persist outputs
      - ./outputs:/app/outputs
      # Mount .env for configuration
      - ./.env:/app/.env:ro
      # Optional: Mount custom mappings
      - ./mappings:/app/mappings:ro
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    # GPU support for NVIDIA DGX Spark
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Ollama for local LLM (if NVIDIA NIM not available)
  ollama:
    image: ollama/ollama:latest
    container_name: esf-copilot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - ollama  # Only starts with: docker compose --profile ollama up
    restart: unless-stopped

volumes:
  ollama_data:

networks:
  default:
    name: esf-copilot-network
